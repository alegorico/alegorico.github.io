<div class="row">
  <!-- Sidebar using SimpleGrid classes -->
  <div class="col-12 col-md-3">
    <div class="card sidebar">
      <div class="card-body">
        <h3 class="brand-title">AlegoricSite</h3>
        <p class="brand-tagline">My site</p>
        <ul class="nav-list">
          <li class="nav-item">
            <a class="paper-btn" href="#/posts">Posts</a>
          </li>
          <li class="nav-item">
            <a class="paper-btn btn-secondary" href="https://github.com/alegorico" target="_blank">Github</a>
          </li>
        </ul>
      </div>
    </div>
  </div>
  
  <!-- Content area using SimpleGrid classes -->
  <div class="col-12 col-md-9 content">
    <div class="card border-danger">
      <div class="card-body">
        <h2 class="content-title text-danger">🚫 Error</h2>
        <p class="card-text"><%= data.message %></p>
        <a class="paper-btn btn-danger-outline" href="#/posts">Volver al inicio</a>
      </div>
    </div>
  </div>
</div>
